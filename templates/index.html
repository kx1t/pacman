<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pacman Simulator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap"
    rel="stylesheet"
  />
  <link rel="icon" type="image/svg+xml" href="{{ favicon_url }}" />
  <link rel="stylesheet" href="{{ styles_url }}" />
</head>
<body>
  <main class="app-shell">
    <header class="hud" aria-label="Game score board">
      <div>Score: <span id="score">0</span></div>
      <div>High Score: <span id="high-score">-</span></div>
      <div>High Scorer: <span id="high-scorer">-</span></div>
      <div><span id="ghost-mode">-</span></div>
      <div class="hud-action-cell">
        <button id="settings-btn" type="button">Settings</button>
        <div id="run-status" class="run-status hidden" aria-live="polite">
          <div>Difficulty: <span id="difficulty-value">Classic</span></div>
          <div>Time: <span id="elapsed-time">00:00</span></div>
        </div>
      </div>
    </header>

    <div class="board-wrap">
      <canvas id="game-canvas" aria-label="Pacman game board"></canvas>
      <button id="start-btn" type="button">Start Game</button>
    </div>

    <div id="touch-controls" class="touch-controls" aria-label="Touch controls">
      <button class="touch-control touch-control-up" data-direction="arrowup" type="button" aria-label="Move up">Up</button>
      <div class="touch-controls-middle">
        <button class="touch-control touch-control-left" data-direction="arrowleft" type="button" aria-label="Move left">Left</button>
        <button class="touch-control touch-control-right" data-direction="arrowright" type="button" aria-label="Move right">Right</button>
      </div>
      <button class="touch-control touch-control-down" data-direction="arrowdown" type="button" aria-label="Move down">Down</button>
    </div>
  </main>

  <div id="name-modal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="name-title">
    <div class="modal-card">
      <h2 id="name-title">New High Score</h2>
      <p>Enter your name:</p>
      <input id="name-input" type="text" maxlength="20" placeholder="Player" />
      <button id="name-submit" type="button">Save</button>
    </div>
  </div>

  <div id="settings-modal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="settings-title">
    <div class="modal-card settings-card">
      <h2 id="settings-title">Settings</h2>

      <div class="settings-section">
        <p>Difficulty</p>
        <div class="difficulty-options">
          <button class="difficulty-btn" data-difficulty="relaxed" type="button">Relaxed</button>
          <button class="difficulty-btn" data-difficulty="classic" type="button">Classic</button>
          <button class="difficulty-btn" data-difficulty="arcade" type="button">Arcade</button>
        </div>
      </div>

      <div class="settings-section">
        <p>Theme</p>
        <div class="difficulty-options">
          <button class="theme-btn" data-theme="light" type="button">Light</button>
          <button class="theme-btn" data-theme="dark" type="button">Dark</button>
          <button class="theme-btn" data-theme="classic" type="button">Classic</button>
        </div>
      </div>

      <div class="settings-section">
        <p>Field Size</p>
        <div class="field-size-grid">
          <label for="settings-rows">Rows</label>
          <input id="settings-rows" type="number" min="21" max="61" step="2" />
          <label for="settings-cols">Cols</label>
          <input id="settings-cols" type="number" min="21" max="61" step="2" />
        </div>
        <p id="field-size-current">Current: -</p>
        <button id="apply-field-size-btn" type="button">Apply Field Size</button>
      </div>

      <div class="settings-section">
        <button id="reset-high-score-btn" class="danger-btn" type="button">Reset High Score</button>
      </div>

      <button id="settings-close" type="button">Close</button>
    </div>
  </div>

  <script>
    window.GAME_CONFIG = {{ game_config | tojson }};
    window.HIGH_SCORE_API_URL = {{ high_score_api_url | tojson }};
    window.RESET_HIGH_SCORE_API_URL = {{ reset_high_score_api_url | tojson }};
  </script>
  <script src="{{ game_js_url }}"></script>
</body>
</html>
