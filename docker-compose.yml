services:
  pacman:
    build:
      context: .
      dockerfile: Dockerfile
      platforms:
        # linux/amd64 target covers Intel Linux, Intel Mac via Docker, and Windows via Docker Desktop + WSL2.
        - linux/amd64
        # linux/arm64 target covers ARM Linux and Apple Silicon Mac via Docker.
        - linux/arm64
    ports:
      - "${APP_PORT}:80"
    environment:
      - PORT=80
      - HIGH_SCORE_FILE=${HIGH_SCORE_FILE}
      - MAZE_ROWS=${MAZE_ROWS}
      - MAZE_COLS=${MAZE_COLS}
      - COLOR_WALL=${COLOR_WALL}
      - COLOR_PATH=${COLOR_PATH}
      - COLOR_PACMAN=${COLOR_PACMAN}
      - COLOR_PELLET=${COLOR_PELLET}
      - COLOR_SUPER_PELLET=${COLOR_SUPER_PELLET}
      - COLOR_BORDER=${COLOR_BORDER}
    volumes:
      - pacman_data:/data

volumes:
  pacman_data:
