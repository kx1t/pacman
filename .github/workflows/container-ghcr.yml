name: Build and Publish Container

on:
  push:
    branches: [main]
    paths-ignore:
      - README*
      - docs/**
      - .github/ISSUE_TEMPLATE/**
      - .github/PULL_REQUEST_TEMPLATE*
      - "**/*.md"
      - CODEOWNERS
      - LICENSE
      - CONTRIBUTING*
  pull_request:
    branches: [main]
    paths-ignore:
      - README*
      - docs/**
      - .github/ISSUE_TEMPLATE/**
      - .github/PULL_REQUEST_TEMPLATE*
      - "**/*.md"
      - CODEOWNERS
      - LICENSE
      - CONTRIBUTING*
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-arch:
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
            runner: ubuntu-24.04
            targets: Intel Linux, Intel Mac (Docker), Windows (Docker Desktop + WSL2)
          - arch: arm64
            platform: linux/arm64
            runner: ubuntu-24.04-arm
            targets: ARM Linux, Apple Silicon Mac (Docker)
    name: Build ${{ matrix.platform }} for ${{ matrix.targets }}
    runs-on: ${{ matrix.runner }}
    env:
      IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tags
        id: tags
        run: |
          set -euo pipefail
          echo "sha_tag=${IMAGE_NAME}:sha-${GITHUB_SHA}-${{ matrix.arch }}" >> "$GITHUB_OUTPUT"
          if [[ "${GITHUB_REF_NAME}" == "main" ]]; then
            echo "latest_tag=${IMAGE_NAME}:latest-${{ matrix.arch }}" >> "$GITHUB_OUTPUT"
          else
            echo "latest_tag=" >> "$GITHUB_OUTPUT"
          fi

      - name: Build per-arch image (PR validation)
        if: github.event_name == 'pull_request'
        uses: docker/build-push-action@v6
        with:
          context: .
          pull: true
          push: false
          platforms: ${{ matrix.platform }}
          cache-from: |
            type=gha,scope=build-${{ matrix.arch }}
            type=registry,ref=${{ env.IMAGE_NAME }}:buildcache-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=build-${{ matrix.arch }}

      - name: Build and push per-arch image (native runner)
        if: github.event_name != 'pull_request'
        uses: docker/build-push-action@v6
        with:
          context: .
          pull: true
          push: true
          platforms: ${{ matrix.platform }}
          tags: |
            ${{ steps.tags.outputs.sha_tag }}
            ${{ steps.tags.outputs.latest_tag }}
          cache-from: |
            type=gha,scope=build-${{ matrix.arch }}
            type=registry,ref=${{ env.IMAGE_NAME }}:buildcache-${{ matrix.arch }}
          cache-to: |
            type=gha,mode=max,scope=build-${{ matrix.arch }}
            type=registry,ref=${{ env.IMAGE_NAME }}:buildcache-${{ matrix.arch }},mode=max

  publish-manifest:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-24.04
    needs: build-arch
    env:
      IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish multi-arch SHA manifest
        run: |
          set -euo pipefail
          docker buildx imagetools create \
            --tag "${IMAGE_NAME}:sha-${GITHUB_SHA}" \
            "${IMAGE_NAME}:sha-${GITHUB_SHA}-amd64" \
            "${IMAGE_NAME}:sha-${GITHUB_SHA}-arm64"

      - name: Publish multi-arch latest manifest
        if: github.ref_name == 'main'
        run: |
          set -euo pipefail
          docker buildx imagetools create \
            --tag "${IMAGE_NAME}:latest" \
            "${IMAGE_NAME}:latest-amd64" \
            "${IMAGE_NAME}:latest-arm64"
